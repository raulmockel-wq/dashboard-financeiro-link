<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<style>
:root {
  --bg: #06091a; --bg2: #0d1228; --panel: #131a35; --panel2: #1c2547;
  --text: #f1f4ff; --muted: #8e98c2; --line: #252e54;
  --green: #34d399; --green-soft: rgba(52,211,153,0.12);
  --red: #f87171; --red-soft: rgba(248,113,113,0.12);
  --warn: #fbbf24; --warn-soft: rgba(251,191,36,0.12);
  --info: #60a5fa; --info-soft: rgba(96,165,250,0.12);
  --purple: #c084fc; --purple-soft: rgba(192,132,252,0.12);
  --pink: #fb7185;
  --radius: 16px; --radius-sm: 10px;
  --shadow-card: 0 1px 0 rgba(255,255,255,0.04) inset, 0 8px 24px rgba(0,0,0,0.35);
  --shadow-elev: 0 1px 0 rgba(255,255,255,0.06) inset, 0 16px 36px rgba(0,0,0,0.45);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--bg); color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-feature-settings: 'tnum', 'ss01'; line-height: 1.5; min-height: 100vh;
  -webkit-font-smoothing: antialiased; }
body {
  background-image:
    radial-gradient(ellipse 1200px 600px at 50% -100px, rgba(96,165,250,0.08), transparent 70%),
    radial-gradient(ellipse 800px 500px at 80% 200px, rgba(192,132,252,0.06), transparent 70%);
  background-attachment: fixed;
  padding-bottom: env(safe-area-inset-bottom);
}
.container { max-width: 1340px; margin: 0 auto; padding: 28px 18px 60px;
  padding-top: max(28px, env(safe-area-inset-top)); }

/* HEADER */
header { display: flex; justify-content: space-between; align-items: flex-end;
  flex-wrap: wrap; gap: 16px; padding-bottom: 22px; margin-bottom: 26px; }
header h1 { font-size: 30px; font-weight: 900; letter-spacing: -0.025em;
  background: linear-gradient(180deg, #fff 60%, #b8c2e5 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  display: flex; align-items: center; gap: 12px; }
header h1 .badge { font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--green); background: var(--green-soft); padding: 4px 9px;
  border-radius: 6px; font-weight: 700; letter-spacing: 0.02em; -webkit-text-fill-color: var(--green); }
header .sub { color: var(--muted); font-size: 13px; margin-top: 6px; font-weight: 500; }
.actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.last-update { color: var(--muted); font-size: 12px;
  font-family: 'JetBrains Mono', monospace; }

button { background: var(--green); color: #06091a; border: 0;
  padding: 10px 16px; border-radius: var(--radius-sm); font-weight: 700;
  cursor: pointer; font-size: 13px; transition: transform 0.1s, box-shadow 0.15s;
  box-shadow: 0 4px 12px rgba(52,211,153,0.25); }
button:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(52,211,153,0.35); }
button:active { transform: translateY(0); }
button.ghost { background: transparent; color: var(--text);
  border: 1px solid var(--line); box-shadow: none; }
button.ghost:hover { background: var(--panel); border-color: #3b4366; }

/* TABS */
.tab-nav { display: flex; gap: 4px; margin-bottom: 20px;
  background: var(--panel); border: 1px solid var(--line);
  border-radius: var(--radius-sm); padding: 4px; width: fit-content; }
.tab-btn { background: transparent; color: var(--muted); border: 0;
  padding: 10px 18px; cursor: pointer; font-size: 14px; font-weight: 600;
  border-radius: 8px; transition: all 0.15s; }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { background: var(--bg2); color: var(--text);
  box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset; }

/* MONTH PICKER */
.month-picker { display: flex; gap: 6px; margin-bottom: 26px; flex-wrap: wrap;
  overflow-x: auto; padding-bottom: 4px;
  -webkit-overflow-scrolling: touch; }
.month-btn { background: var(--panel); color: var(--text); border: 1px solid var(--line);
  padding: 9px 18px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px;
  font-weight: 600; transition: all 0.15s; white-space: nowrap;
  font-family: 'JetBrains Mono', monospace; letter-spacing: 0.02em; }
.month-btn:hover { border-color: #3b4366; background: var(--panel2); }
.month-btn.active { background: linear-gradient(135deg, var(--info), #4f8fe9);
  color: #fff; border-color: var(--info); font-weight: 700;
  box-shadow: 0 4px 14px rgba(96,165,250,0.4); }

/* KPI CARDS */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 14px; margin-bottom: 24px; }
.kpi { background: var(--panel); border-radius: var(--radius); padding: 22px 22px 20px;
  border: 1px solid var(--line); transition: all 0.2s; position: relative;
  overflow: hidden; box-shadow: var(--shadow-card); }
.kpi::before { content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 2px; background: var(--info); opacity: 0.5; }
.kpi.blue::before { background: var(--info); }
.kpi.purple::before { background: var(--purple); }
.kpi.green::before { background: var(--green); }
.kpi.yellow::before { background: var(--warn); }
.kpi.red::before { background: var(--red); }
.kpi:hover { transform: translateY(-3px); border-color: #3b4366;
  box-shadow: var(--shadow-elev); }
.kpi .label { color: var(--muted); font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.08em; font-weight: 700; display: flex; align-items: center; gap: 6px; }
.kpi .value { font-size: 28px; font-weight: 800; margin-top: 10px;
  letter-spacing: -0.02em; font-variant-numeric: tabular-nums;
  font-family: 'Inter', sans-serif; }
.kpi .sub { color: var(--muted); font-size: 12px; margin-top: 6px; font-weight: 500; }
.kpi.blue .value { color: var(--info); }
.kpi.purple .value { color: var(--purple); }
.kpi.green .value { color: var(--green); }
.kpi.red .value { color: var(--red); }
.kpi.yellow .value { color: var(--warn); }

/* SECTION */
.section { margin-bottom: 30px; }
.section-title { font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--muted); font-weight: 700; margin-bottom: 14px;
  padding-bottom: 10px; border-bottom: 1px solid var(--line);
  display: flex; justify-content: space-between; align-items: baseline;
  flex-wrap: wrap; gap: 8px; }
.section-title .right { font-size: 12px; color: var(--green); font-weight: 700;
  text-transform: none; letter-spacing: 0; font-family: 'JetBrains Mono', monospace; }

.card { background: var(--panel); border: 1px solid var(--line);
  border-radius: var(--radius); padding: 22px; margin-bottom: 16px;
  box-shadow: var(--shadow-card); }
.card h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.card .hint { color: var(--muted); font-size: 12px; margin-bottom: 14px; }
.row { display: grid; gap: 14px; }
.row.two { grid-template-columns: 1fr 1fr; }
@media (max-width: 900px) { .row.two { grid-template-columns: 1fr; } }

/* TABELA */
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl th { text-align: left; color: var(--muted); font-weight: 700; text-transform: uppercase;
  font-size: 10px; letter-spacing: 0.08em; padding: 12px 14px;
  border-bottom: 1px solid var(--line); background: var(--bg2); position: sticky; top: 0; z-index: 1; }
.tbl td { padding: 11px 14px; border-bottom: 1px solid #1a2240;
  font-variant-numeric: tabular-nums; }
.tbl td.num { text-align: right; font-weight: 600;
  font-family: 'JetBrains Mono', monospace; font-size: 12px; }
.tbl td.muted { color: var(--muted); font-size: 12px; }
.tbl tr:hover td { background: var(--panel2); }
.tbl tr.total td { font-weight: 800; background: var(--bg2); border-top: 2px solid var(--green);
  color: var(--green); padding: 14px; }
.tbl tr.pendente td { color: var(--warn); }
.tbl tr.pendente td:first-child::before { content: "⏳ "; }

/* LOADING */
.loading { text-align: center; padding: 100px 20px; color: var(--muted); }
.loading .spinner { display: inline-block; width: 40px; height: 40px;
  border: 3px solid var(--line); border-top-color: var(--green); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin-bottom: 18px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error { color: var(--red); padding: 16px; background: var(--red-soft);
  border-radius: var(--radius-sm); margin: 16px 0; border-left: 4px solid var(--red); }
.empty { padding: 50px 20px; text-align: center; color: var(--muted); font-size: 14px; }

/* CHART */
.chart-box { height: 320px; position: relative; }

/* WARNING / ALERT */
.alert { padding: 14px 18px; border-radius: var(--radius-sm); margin-bottom: 12px;
  font-size: 13px; line-height: 1.55; display: flex; gap: 12px; align-items: flex-start; }
.alert.warn { background: var(--warn-soft); border-left: 4px solid var(--warn); }
.alert.info { background: var(--info-soft); border-left: 4px solid var(--info); }
.alert .icon { font-size: 18px; flex-shrink: 0; }

/* TAG */
.tag { display: inline-block; padding: 3px 10px; border-radius: 12px;
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
.tag.pago { background: var(--green-soft); color: var(--green); }
.tag.pendente { background: var(--warn-soft); color: var(--warn); }
.tag.muted { background: var(--panel2); color: var(--muted); }

.footer { margin-top: 60px; padding-top: 24px; border-top: 1px solid var(--line);
  text-align: center; color: var(--muted); font-size: 11px; }
.footer a { color: var(--info); text-decoration: none; font-weight: 600; }
.footer a:hover { text-decoration: underline; }

/* MOBILE */
@media (max-width: 720px) {
  .container { padding: 18px 12px 50px; }
  header { gap: 10px; padding-bottom: 16px; margin-bottom: 18px; }
  header h1 { font-size: 22px; }
  .kpi { padding: 18px 18px 16px; }
  .kpi .value { font-size: 24px; }
  .card { padding: 16px; }
  .tab-nav { width: 100%; overflow-x: auto; }
  .tab-btn { padding: 9px 14px; font-size: 13px; flex-shrink: 0; }
  .tbl th, .tbl td { padding: 9px 10px; font-size: 12px; }
  .tbl td.num { font-size: 11px; }
}
</style>

<body>
<div class="container">
<header>
  <div>
    <h1>💼 Dashboard Financeiro <span class="badge">v3.1</span></h1>
    <div class="sub">Lê suas planilhas Google Sheets ao vivo · atualiza sozinho</div>
  </div>
  <div class="actions">
    <span class="last-update" id="lastUpdate">—</span>
    <button onclick="carregar(true)">🔄 Atualizar</button>
  </div>
</header>

<div class="tab-nav">
  <button class="tab-btn active" data-tab="pj" onclick="trocarAba('pj')">🏢 Jurídico (Link)</button>
  <button class="tab-btn" data-tab="pf" onclick="trocarAba('pf')">👤 Pessoal (Raul)</button>
  <button class="tab-btn" data-tab="resumo" onclick="trocarAba('resumo')">📊 Comparativo</button>
</div>

  <div class="spinner"></div>
  <div>Lendo as planilhas direto do Google Sheets...</div>
</div>

<div id="conteudo" style="display:none;">
  <div class="month-picker" id="mesPicker"></div>

  <!-- ABA PJ -->
  <div class="tab-content" id="tab-pj">
    <div id="kpisPJ" class="kpi-grid"></div>
    <div id="conteudoPJ"></div>
  </div>

  <!-- ABA PF -->
  <div class="tab-content" id="tab-pf" style="display:none;">
    <div id="kpisPF" class="kpi-grid"></div>
    <div id="conteudoPF"></div>
  </div>

  <!-- ABA RESUMO -->
  <div class="tab-content" id="tab-resumo" style="display:none;">
    <div id="kpisResumo" class="kpi-grid"></div>
    <div class="card">
      <h3>📈 Evolução mensal</h3>
      <div class="hint">Comparativo PJ vs PF dos últimos meses</div>
      <div class="chart-box"><canvas id="grafEvolucao"></canvas></div>
    </div>
  </div>
</div>

<div class="footer">
  Atualização automática a cada 5 min · clique 🔄 pra forçar agora ·
  <a href="https://docs.google.com/spreadsheets/d/1_F-skyPq1lxkAvGZXo-xpnZuIZcP5GxJ0EZwfpER5Qc"
     target="_blank" style="color: var(--info)">abrir planilha PJ</a> ·
  <a href="https://docs.google.com/spreadsheets/d/1PvGrNSWF_QSuKjVPM75SgrCkDixqt9GPND0_RnwccI4"
     target="_blank" style="color: var(--info)">abrir planilha PF</a>
</div>

</div>

<script>
const PJ_ID = '1_F-skyPq1lxkAvGZXo-xpnZuIZcP5GxJ0EZwfpER5Qc';
const PF_ID = '1PvGrNSWF_QSuKjVPM75SgrCkDixqt9GPND0_RnwccI4';
const MESES = ['Janeiro 2026','Fevereiro 2026','Março 2026','Abril 2026','Maio 2026'];
const MESES_SHORT = ['Jan','Fev','Mar','Abr','Mai'];

let dadosPJ = {}, dadosPF = {};
let mesSelecionado = 'Maio 2026';
let abaAtiva = 'pj';
let chartEvolucao = null;

// ==================== UTILITÁRIOS ====================
function fmt(v, casas) {
  if (v === null || v === undefined || isNaN(v)) return casas === 2 ? 'R$ 0,00' : 'R$ 0';
  return 'R$ ' + Number(v).toLocaleString('pt-BR',
    {minimumFractionDigits: casas||0, maximumFractionDigits: casas||0});
}
const fmtBR = v => fmt(v, 0);
const fmtBR2 = v => fmt(v, 2);

function parseDinheiro(s) {
  // converte "R$ 25.645,39" ou "R$25.645,39" ou 25645.39 (já número) para Decimal-ish via número JS
  if (s === null || s === undefined || s === '') return 0;
  if (typeof s === 'number') return s;
  let str = String(s).replace(/R\$/g, '').replace(/\s/g, '').trim();
  // remove "."" como separador de milhar, troca "," por "."
  if (str.includes(',')) {
    str = str.replace(/\./g, '').replace(',', '.');
  }
  const n = parseFloat(str);
  return isNaN(n) ? 0 : n;
}

// ==================== FETCH GOOGLE SHEETS ====================
async function fetchAba(sheetId, sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
  // timeout de 15s pra não ficar carregando pra sempre
  const ctrl = new AbortController();
  const timeoutId = setTimeout(() => ctrl.abort(), 15000);
  let t;
  try {
    const r = await fetch(url + '&t=' + Date.now(), {signal: ctrl.signal, cache: 'no-store'});
    clearTimeout(timeoutId);
    if (!r.ok) throw new Error(`HTTP ${r.status} - ${r.statusText}`);
    t = await r.text();
  } catch (e) {
    clearTimeout(timeoutId);
    throw new Error(`Falhou ao buscar "${sheetName}": ${e.message}`);
  }
  let json;
  try {
    json = JSON.parse(t.substring(t.indexOf('(')+1, t.lastIndexOf(')')));
  } catch (e) {
    throw new Error(`Resposta inválida do Google Sheets pra "${sheetName}"`);
  }
  const rows = json.table.rows || [];
  return rows.map(r => {
    const c = r.c || [];
    return [0,1,2,3,4,5,6,7].map(i => {
      const cell = c[i];
      if (!cell) return null;
      // pra valor (cols 2 e 4), usar .v (número limpo)
      // pra data (cols 1 e 3), usar .f (formato dd/mm/yyyy)
      // pra texto (cols 0, 5, 6, 7), usar .v ou .f
      if (i === 1 || i === 3) return cell.f || cell.v || '';
      if (i === 2 || i === 4) return cell.v !== null && cell.v !== undefined ? cell.v : null;
      return cell.v || '';
    });
  });
}

// ==================== PARSER DE BLOCOS ====================
function parsearBlocos(rows) {
  /*
    Estrutura de cada aba:
    - linha 0: cabeçalho
    - bloco 1 (fixas): linhas com descrição
    - linha de TOTAL bloco 1 (sem desc + valor): salva como bloco1.totalDeclaradoPago
    - bloco 2 (aleatórias): linhas com descrição
    - linha de TOTAL bloco 2: salva como bloco2.totalDeclaradoPago
    - linha de TOTAL GERAL: salva como totalGeralDeclarado

    Coletamos TANTO a SOMA calculada das linhas QUANTO o TOTAL declarado pela
    planilha. Se divergirem, mostra warning (planilha tem células fora da fórmula).
  */
  const blocos = [{
    nome: 'fixas', linhas: [],
    somaPrev: 0, somaPago: 0,
    declaradoPrev: 0, declaradoPago: 0
  }];
  let blocoAtual = 0;
  let totalGeralDeclaradoPrev = 0, totalGeralDeclaradoPago = 0;
  let totaisDetectados = 0;  // quantas linhas de total já vimos

  for (let i = 0; i < rows.length; i++) {
    const r = rows[i];
    const desc = (r[0] || '').toString().trim();
    const valorPrev = parseDinheiro(r[2]);
    const valorPago = parseDinheiro(r[4]);
    const isVazia = !desc && valorPrev === 0 && valorPago === 0;
    if (isVazia) continue;

    if (desc.toLowerCase() === 'descrição') continue;

    const ehLinhaTotal = (!desc && (valorPrev > 0 || valorPago > 0))
                       || /^total/i.test(desc);
    if (ehLinhaTotal) {
      totaisDetectados++;
      if (totaisDetectados === 1) {
        // total do bloco fixas
        blocos[0].declaradoPrev = valorPrev;
        blocos[0].declaradoPago = valorPago;
        // começa bloco aleatórias
        blocoAtual = 1;
        blocos.push({
          nome: 'aleatorias', linhas: [],
          somaPrev: 0, somaPago: 0,
          declaradoPrev: 0, declaradoPago: 0
        });
      } else if (totaisDetectados === 2) {
        // pode ser total bloco aleatórias OU total geral (depende se tem mais)
        // por enquanto assume total aleatórias e atualiza se vier mais
        blocos[1].declaradoPrev = valorPrev;
        blocos[1].declaradoPago = valorPago;
      } else {
        // 3+ = total geral
        totalGeralDeclaradoPrev = valorPrev;
        totalGeralDeclaradoPago = valorPago;
      }
      continue;
    }

    blocos[blocoAtual].linhas.push({
      descricao: desc,
      vencimento: (r[1] || '').toString().trim(),
      valorPrevisto: valorPrev,
      dataPgto: (r[3] || '').toString().trim(),
      valorPago: valorPago,
      bancoOrigem: (r[5] || '').toString().trim(),
      bancoDestino: (r[6] || '').toString().trim(),
    });
    blocos[blocoAtual].somaPrev += valorPrev;
    blocos[blocoAtual].somaPago += valorPago;
  }

  // Se tem só 2 totais detectados (não 3), o segundo é tanto total bloco 2 quanto total geral
  if (totaisDetectados === 2 && blocos[1]) {
    totalGeralDeclaradoPrev = blocos[0].declaradoPrev + blocos[1].declaradoPrev;
    totalGeralDeclaradoPago = blocos[0].declaradoPago + blocos[1].declaradoPago;
  }

  return {
    fixas: blocos[0] || {linhas: [], somaPrev: 0, somaPago: 0, declaradoPrev: 0, declaradoPago: 0},
    aleatorias: blocos[1] || {linhas: [], somaPrev: 0, somaPago: 0, declaradoPrev: 0, declaradoPago: 0},
    totalGeralDeclaradoPrev,
    totalGeralDeclaradoPago,
  };
}

// ==================== CARREGAMENTO ====================
async function carregar(forceNotify) {
  const loadingEl = document.getElementById('loading');
  loadingEl.style.display = 'block';
  loadingEl.innerHTML = '<div class="spinner"></div><div>Lendo as planilhas direto do Google Sheets...</div><div id="logsCarregamento" style="margin-top:18px; font-size:11px; color:var(--muted); font-family: monospace; text-align: left; max-width: 500px; margin-left: auto; margin-right: auto;"></div>';
  document.getElementById('conteudo').style.display = 'none';
  const logEl = document.getElementById('logsCarregamento');
  const log = (msg) => { if (logEl) logEl.innerHTML += msg + '<br>'; };

  log('🔄 Iniciando carregamento...');
  let sucessos = 0, falhas = 0;
  const erros = [];

  try {
    const promessas = [];
    for (const mes of MESES) {
      promessas.push(
        fetchAba(PJ_ID, mes)
          .then(r => ({mes, tipo:'pj', rows:r, ok:true}))
          .catch(e => ({mes, tipo:'pj', erro: e.message, ok:false}))
      );
      promessas.push(
        fetchAba(PF_ID, mes)
          .then(r => ({mes, tipo:'pf', rows:r, ok:true}))
          .catch(e => ({mes, tipo:'pf', erro: e.message, ok:false}))
      );
    }
    const todos = await Promise.all(promessas);

    dadosPJ = {}; dadosPF = {};
    for (const p of todos) {
      if (p.ok) {
        sucessos++;
        const parsed = parsearBlocos(p.rows);
        if (p.tipo === 'pj') dadosPJ[p.mes] = parsed;
        else dadosPF[p.mes] = parsed;
      } else {
        falhas++;
        erros.push(`${p.tipo.toUpperCase()} ${p.mes}: ${p.erro}`);
      }
    }
    log(`✅ ${sucessos} sucessos · ❌ ${falhas} falhas`);
    if (falhas > 0) {
      log('⚠️ Erros: ' + erros.slice(0,3).join(' | '));
    }

    if (sucessos === 0) {
      throw new Error('Nenhuma planilha carregou. Verifique conexão e se as planilhas ainda estão compartilhadas como "qualquer um com link pode ver".');
    }

    document.getElementById('lastUpdate').textContent = 'Atualizado às ' + new Date().toLocaleTimeString('pt-BR');
    montarPickerMeses();
    renderizar();
    loadingEl.style.display = 'none';
    document.getElementById('conteudo').style.display = 'block';
  } catch (e) {
    loadingEl.innerHTML = `
      <div class="error">
        <strong>❌ Erro ao carregar dashboard</strong><br><br>
        ${e.message}<br><br>
        <button onclick="carregar()" style="background:var(--info); color:#fff;">Tentar de novo</button>
      </div>
      <div style="margin-top:20px; padding: 16px; background: var(--panel); border-radius: 8px; text-align: left; max-width: 600px; margin-left: auto; margin-right: auto; font-size: 13px;">
        <strong>Diagnóstico:</strong><br>
        • Sucessos: ${sucessos} | Falhas: ${falhas}<br>
        ${erros.length ? '• Erros: ' + erros.slice(0,5).join('<br>• ') : ''}
      </div>
    `;
    console.error(e);
  }
}

function montarPickerMeses() {
  const picker = document.getElementById('mesPicker');
  picker.innerHTML = '';
  MESES.forEach((mes, i) => {
    const btn = document.createElement('button');
    btn.className = 'month-btn' + (mes === mesSelecionado ? ' active' : '');
    btn.textContent = MESES_SHORT[i] + ' / 2026';
    btn.onclick = () => { mesSelecionado = mes; montarPickerMeses(); renderizar(); };
    picker.appendChild(btn);
  });
}

// ==================== RENDER ====================
function renderizar() {
  renderTipo('pj', dadosPJ);
  renderTipo('pf', dadosPF);
  renderResumo();
}

function renderTipo(tipo, dados) {
  const m = dados[mesSelecionado];
  const upper = tipo.toUpperCase();
  // limpar warnings antigos
  const oldWarn = document.getElementById('warn-' + tipo);
  if (oldWarn) oldWarn.remove();
  if (!m) {
    document.getElementById('kpis' + upper).innerHTML = '<div class="empty">Sem dados para esse mês.</div>';
    document.getElementById('conteudo' + upper).innerHTML = '';
    return;
  }

  // KPIs — usamos os TOTAIS DECLARADOS pela planilha (não nossa soma)
  const fixasPago = m.fixas.declaradoPago;
  const aleaPago = m.aleatorias.declaradoPago;
  const totalPago = m.totalGeralDeclaradoPago;

  // PENDENTE = soma do "Valor" das linhas onde "Valor Pago" == 0
  let pendenteValor = 0, pendenteContas = 0;
  for (const bloco of [m.fixas, m.aleatorias]) {
    for (const l of bloco.linhas) {
      if (l.valorPrevisto > 0 && l.valorPago === 0) {
        pendenteValor += l.valorPrevisto;
        pendenteContas++;
      }
    }
  }

  // Divergências entre nossa soma e total declarado pela planilha
  const diffFixas = Math.round((m.fixas.somaPago - m.fixas.declaradoPago) * 100) / 100;
  const diffAlea = Math.round((m.aleatorias.somaPago - m.aleatorias.declaradoPago) * 100) / 100;
  const warnings = [];
  if (Math.abs(diffFixas) > 0.01) {
    warnings.push(`Despesas Fixas: planilha mostra R$ ${fmtBR2(m.fixas.declaradoPago).replace('R$ ','')}, mas a soma das ${m.fixas.linhas.length} linhas dá R$ ${fmtBR2(m.fixas.somaPago).replace('R$ ','')} (diferença de ${diffFixas > 0 ? '+' : ''}${fmtBR2(diffFixas).replace('R$ ','')}). Pode ter linha fora da fórmula.`);
  }
  if (Math.abs(diffAlea) > 0.01) {
    warnings.push(`Despesas Aleatórias: planilha mostra R$ ${fmtBR2(m.aleatorias.declaradoPago).replace('R$ ','')}, mas a soma das ${m.aleatorias.linhas.length} linhas dá R$ ${fmtBR2(m.aleatorias.somaPago).replace('R$ ','')} (diferença de ${diffAlea > 0 ? '+' : ''}${fmtBR2(diffAlea).replace('R$ ','')}). Pode ter linha fora da fórmula.`);
  }

  document.getElementById('kpis' + upper).innerHTML = `
    <div class="kpi blue">
      <div class="label">📌 Despesas Fixas</div>
      <div class="value">${fmtBR2(fixasPago)}</div>
      <div class="sub">${m.fixas.linhas.filter(l=>l.valorPago>0).length} de ${m.fixas.linhas.length} pagas</div>
    </div>
    <div class="kpi purple">
      <div class="label">✨ Despesas Aleatórias</div>
      <div class="value">${fmtBR2(aleaPago)}</div>
      <div class="sub">${m.aleatorias.linhas.filter(l=>l.valorPago>0).length} de ${m.aleatorias.linhas.length} pagas</div>
    </div>
    <div class="kpi green">
      <div class="label">✅ Total pago no mês</div>
      <div class="value">${fmtBR2(totalPago)}</div>
      <div class="sub">Fixas + Aleatórias (da planilha)</div>
    </div>
    <div class="kpi yellow">
      <div class="label">⏳ Pendente</div>
      <div class="value">${fmtBR2(pendenteValor)}</div>
      <div class="sub">${pendenteContas} contas a pagar</div>
    </div>
  `;

  // Renderiza avisos de divergência
  if (warnings.length > 0) {
    const warnHtml = warnings.map(w =>
      `<div class="alert warn"><div class="icon">⚠️</div><div>${w}</div></div>`
    ).join('');
    document.getElementById('kpis' + upper).insertAdjacentHTML('afterend',
      `<div id="warn-${tipo}">${warnHtml}</div>`);
  }

  // Tabelas detalhadas
  let html = '';
  html += renderTabelaBloco('Despesas Fixas', 'fixa', m.fixas);
  html += renderTabelaBloco('Despesas Aleatórias', 'aleatoria', m.aleatorias);
  document.getElementById('conteudo' + upper).innerHTML = html;
}

function renderTabelaBloco_OLD(titulo, tagClass, bloco) {

function renderTabelaBloco(titulo, tagClass, bloco) {
  if (!bloco || bloco.linhas.length === 0) {
    return `<div class="section">
      <div class="section-title">${titulo}</div>
      <div class="card"><div class="empty">Nenhum lançamento neste bloco.</div></div>
    </div>`;
  }
  const tipoEmoji = tagClass === 'fixa' ? '📌' : '✨';
  let html = `<div class="section">
    <div class="section-title">
      <span>${tipoEmoji} ${titulo}</span>
      <span class="right">Total declarado: ${fmtBR2(bloco.declaradoPago)}</span>
    </div>
    <div class="card" style="padding: 0; overflow-x: auto;">
    <table class="tbl">
    <thead><tr>
      <th>Descrição</th><th>Vencimento</th><th>Pago em</th>
      <th>Origem</th><th>Destino</th>
      <th class="num">Valor</th><th class="num">Pago</th><th>Status</th>
    </tr></thead><tbody>`;
  for (const l of bloco.linhas) {
    const pago = l.valorPago > 0;
    const trClass = !pago && l.valorPrevisto > 0 ? 'pendente' : '';
    const status = pago
      ? '<span class="tag pago">Pago</span>'
      : (l.valorPrevisto > 0 ? '<span class="tag pendente">Pendente</span>' : '<span class="tag muted">—</span>');
    html += `<tr class="${trClass}">
      <td>${escapeHtml(l.descricao)}</td>
      <td class="muted">${escapeHtml(l.vencimento)}</td>
      <td class="muted">${escapeHtml(l.dataPgto)}</td>
      <td class="muted">${escapeHtml(l.bancoOrigem)}</td>
      <td class="muted">${escapeHtml(l.bancoDestino)}</td>
      <td class="num">${l.valorPrevisto > 0 ? fmtBR2(l.valorPrevisto) : '—'}</td>
      <td class="num">${l.valorPago > 0 ? fmtBR2(l.valorPago) : '—'}</td>
      <td>${status}</td>
    </tr>`;
  }
  html += `<tr class="total">
    <td colspan="5">SOMA DAS ${bloco.linhas.length} LINHAS</td>
    <td class="num">${fmtBR2(bloco.somaPrev)}</td>
    <td class="num">${fmtBR2(bloco.somaPago)}</td>
    <td></td>
  </tr>
  <tr class="total" style="background: var(--bg2);">
    <td colspan="5">TOTAL DECLARADO NA PLANILHA</td>
    <td class="num">${fmtBR2(bloco.declaradoPrev)}</td>
    <td class="num">${fmtBR2(bloco.declaradoPago)}</td>
    <td></td>
  </tr>
  </tbody></table></div></div>`;
  return html;
}

function renderResumo() {
  const mPJ = dadosPJ[mesSelecionado];
  const mPF = dadosPF[mesSelecionado];
  const pagoPJ = mPJ ? mPJ.totalGeralDeclaradoPago : 0;
  const pagoPF = mPF ? mPF.totalGeralDeclaradoPago : 0;
  document.getElementById('kpisResumo').innerHTML = `
    <div class="kpi blue"><div class="label">Pago PJ (Link) no mês</div>
      <div class="value">${fmtBR2(pagoPJ)}</div></div>
    <div class="kpi purple"><div class="label">Pago PF (Raul) no mês</div>
      <div class="value">${fmtBR2(pagoPF)}</div></div>
    <div class="kpi red"><div class="label">Total geral</div>
      <div class="value">${fmtBR2(pagoPJ + pagoPF)}</div></div>
  `;

  // Gráfico evolução
  const evoPJ = MESES.map(mes => {
    const d = dadosPJ[mes];
    return d ? d.totalGeralDeclaradoPago : 0;
  });
  const evoPF = MESES.map(mes => {
    const d = dadosPF[mes];
    return d ? d.totalGeralDeclaradoPago : 0;
  });
  if (chartEvolucao) chartEvolucao.destroy();
  chartEvolucao = new Chart(document.getElementById('grafEvolucao'), {
    type: 'line',
    data: {
      labels: MESES_SHORT,
      datasets: [
        {label:'PJ (Link)', data: evoPJ, borderColor:'#60a5fa',
         backgroundColor:'rgba(96,165,250,0.1)', tension:0.3, borderWidth:2.5, fill:true},
        {label:'PF (Raul)', data: evoPF, borderColor:'#c084fc',
         backgroundColor:'rgba(192,132,252,0.1)', tension:0.3, borderWidth:2.5, fill:true},
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#e8ecf5', font:{size:13}}}},
      scales:{
        x:{ticks:{color:'#8b95b0'}, grid:{color:'rgba(255,255,255,0.05)'}},
        y:{ticks:{color:'#8b95b0', callback:v=>'R$ '+v.toLocaleString('pt-BR')},
           grid:{color:'rgba(255,255,255,0.05)'}}
      }
    }
  });
}

function trocarAba(t) {
  abaAtiva = t;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === t));
  document.querySelectorAll('.tab-content').forEach(c => c.style.display = c.id === 'tab-' + t ? 'block' : 'none');
}

function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

carregar();
setInterval(() => carregar(false), 5 * 60 * 1000);
</script>
